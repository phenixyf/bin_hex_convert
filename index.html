<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bin / Hex / Dec Register Converter</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --page-bg: #0d1117;
      --panel-bg: #151b23;
      --panel-bg-top: #1a222d;
      --panel-border: #2b3746;
      --muted-border: #334155;
      --soft-bg: #0f151d;
      --soft-bg-raised: #121a24;
      --accent: #66d9c2;
      --accent-strong: #34d399;
      --text: #d7dee8;
      --muted: #8b9aab;
      --danger: #fb7185;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at 12% 0%, rgba(52, 211, 153, 0.11), transparent 30%),
        radial-gradient(circle at 88% 12%, rgba(96, 165, 250, 0.10), transparent 28%),
        linear-gradient(180deg, #0b0f15 0%, var(--page-bg) 46%, #0a0d12 100%);
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
    }

    .viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      padding: 12px;
    }

    .page {
      width: 1440px;
      transform-origin: top left;
      will-change: transform;
    }

    .app {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
    }

    .register-panel {
      min-width: 0;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--panel-bg-top) 0%, var(--panel-bg) 100%);
      padding: 10px;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.32), inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .panel-header {
      display: grid;
      grid-template-columns: 84px 1fr 82px;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .panel-index {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .reg-name {
      width: 100%;
      height: 28px;
      border: 1px solid var(--muted-border);
      border-radius: 5px;
      background: var(--soft-bg);
      color: var(--text);
      text-align: center;
      font: inherit;
      padding: 0 8px;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.35);
    }

    .bit-board {
      display: grid;
      gap: 12px;
      padding: 10px;
      border: 1px solid #263241;
      border-radius: 7px;
      background: linear-gradient(180deg, #101720 0%, #0d131b 100%);
      overflow: hidden;
      box-shadow: inset 0 1px 8px rgba(0, 0, 0, 0.22);
    }

    .bit-row {
      display: grid;
      grid-template-columns: repeat(4, max-content);
      gap: 28px;
      width: 100%;
      justify-content: space-between;
      align-items: start;
    }

    .nibble-group {
      display: grid;
      gap: 5px;
      padding: 0 4px;
    }

    .nibble-labels,
    .nibble-checks {
      display: grid;
      grid-template-columns: repeat(4, 25px);
      column-gap: 7px;
      align-items: center;
      justify-items: center;
    }

    .bit-label {
      height: 17px;
      line-height: 17px;
      color: var(--muted);
      font-size: 12px;
    }

    .bit-cell {
      width: 25px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bit-cell input[type="checkbox"] {
      width: 17px;
      height: 17px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--accent-strong);
    }

    .value-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 10px;
      margin-top: 10px;
    }

    .value-row {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .value-row.bin-row {
      grid-column: 1 / -1;
    }

    button {
      height: 28px;
      border: 1px solid #3b4a5c;
      border-radius: 5px;
      background: linear-gradient(180deg, #1b2531 0%, #141c26 100%);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      line-height: 20px;
      padding: 0 10px;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    button:hover {
      background: linear-gradient(180deg, #243246 0%, #172434 100%);
      border-color: #5b708a;
    }

    button[data-convert="bin"] {
      color: #bfdbfe;
      border-color: #355a86;
    }

    button[data-convert="hex"] {
      color: #f5d08a;
      border-color: #735f32;
    }

    button[data-convert="dec"] {
      color: #a7f3d0;
      border-color: #2f6b59;
    }

    .clear-panel-button {
      width: 82px;
      color: #fecdd3;
      border-color: #6a3444;
      background: linear-gradient(180deg, #2a1720 0%, #1c1117 100%);
    }

    .clear-panel-button:hover {
      border-color: #a34d64;
      background: linear-gradient(180deg, #3a1c28 0%, #24131a 100%);
    }

    .value-input {
      width: 100%;
      min-width: 0;
      height: 28px;
      border: 1px solid var(--muted-border);
      border-radius: 5px;
      background: var(--soft-bg-raised);
      color: #e7edf5;
      font: inherit;
      text-align: center;
      padding: 0 8px;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.35);
    }

    .value-input:focus,
    .reg-name:focus {
      outline: 2px solid rgba(102, 217, 194, 0.20);
      border-color: var(--accent);
      background: #111b26;
    }

    .value-input.invalid {
      border-color: var(--danger);
      background: #26131a;
      color: #fecdd3;
    }
  </style>
</head>
<body>
  <div class="viewport" id="viewport">
    <div class="page" id="page">
      <div class="app" id="app"></div>
    </div>
  </div>

  <script>
    const REGISTER_COUNT = 6;
    const BIT_WIDTH = 32;
    const NIBBLE_WIDTH = 4;
    const MAX_VALUE = (1n << BigInt(BIT_WIDTH)) - 1n;
    const viewport = document.getElementById("viewport");
    const page = document.getElementById("page");
    const app = document.getElementById("app");
    const panels = [];

    function formatBin(value) {
      return value.toString(2).padStart(BIT_WIDTH, "0").match(/.{1,4}/g).join(" ");
    }

    function formatHex(value) {
      return "0X" + value.toString(16).toUpperCase().padStart(8, "0");
    }

    function formatDec(value) {
      return value.toString(10);
    }

    function cleanText(value) {
      return value.trim().replace(/[\s_]/g, "");
    }

    function parseValue(text, base) {
      let valueText = cleanText(text);

      if (base === "bin") {
        valueText = valueText.replace(/^0b/i, "");
        if (!/^[01]+$/.test(valueText)) {
          return null;
        }
        return BigInt("0b" + valueText);
      }

      if (base === "hex") {
        valueText = valueText.replace(/^0x/i, "");
        if (!/^[0-9a-fA-F]+$/.test(valueText)) {
          return null;
        }
        return BigInt("0x" + valueText);
      }

      if (!/^\d+$/.test(valueText)) {
        return null;
      }
      return BigInt(valueText);
    }

    function clampRegisterValue(value) {
      if (value === null || value < 0n || value > MAX_VALUE) {
        return null;
      }
      return value;
    }

    function fitPageToViewport() {
      page.style.transform = "none";
      const viewportWidth = viewport.clientWidth;
      const viewportHeight = viewport.clientHeight;
      const contentWidth = page.offsetWidth;
      const contentHeight = page.offsetHeight;
      const scale = Math.min(viewportWidth / contentWidth, viewportHeight / contentHeight, 1.35);
      const x = Math.max(0, (viewportWidth - contentWidth * scale) / 2);
      const y = Math.max(0, (viewportHeight - contentHeight * scale) / 2);
      page.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    }

    function getPanelValueFromBits(panel) {
      let value = 0n;
      panel.querySelectorAll(".bit-check").forEach((checkbox) => {
        if (checkbox.checked) {
          value |= 1n << BigInt(checkbox.dataset.bit);
        }
      });
      return value;
    }

    function setPanelBits(panel, value) {
      panel.querySelectorAll(".bit-check").forEach((checkbox) => {
        const mask = 1n << BigInt(checkbox.dataset.bit);
        checkbox.checked = (value & mask) !== 0n;
      });
    }

    function setPanelFields(panel, value) {
      panel.querySelector('[data-field="bin"]').value = formatBin(value);
      panel.querySelector('[data-field="hex"]').value = formatHex(value);
      panel.querySelector('[data-field="dec"]').value = formatDec(value);
      panel.querySelectorAll(".value-input").forEach((input) => input.classList.remove("invalid"));
    }

    function applyPanelValue(panel, value) {
      setPanelBits(panel, value);
      setPanelFields(panel, value);
    }

    function markInvalid(input) {
      input.classList.add("invalid");
      input.select();
    }

    function createNibbleGroup(startBit) {
      const group = document.createElement("div");
      group.className = "nibble-group";

      const labels = document.createElement("div");
      labels.className = "nibble-labels";
      const checks = document.createElement("div");
      checks.className = "nibble-checks";

      for (let offset = 0; offset < NIBBLE_WIDTH; offset += 1) {
        const bit = startBit - offset;
        const label = document.createElement("div");
        label.className = "bit-label";
        label.textContent = bit;
        labels.appendChild(label);

        const cell = document.createElement("label");
        cell.className = "bit-cell";
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "bit-check";
        checkbox.dataset.bit = bit;
        cell.appendChild(checkbox);
        checks.appendChild(cell);
      }

      group.append(labels, checks);
      return group;
    }

    function createBitRow(startBit) {
      const row = document.createElement("div");
      row.className = "bit-row";
      for (let bit = startBit; bit > startBit - 16; bit -= NIBBLE_WIDTH) {
        row.appendChild(createNibbleGroup(bit));
      }
      return row;
    }

    function createBitBoard() {
      const board = document.createElement("div");
      board.className = "bit-board";
      board.append(createBitRow(31), createBitRow(15));
      return board;
    }

    function createValueRow(label, fieldName) {
      const row = document.createElement("div");
      row.className = `value-row ${fieldName}-row`;
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = label;
      button.dataset.convert = fieldName;
      const input = document.createElement("input");
      input.className = "value-input";
      input.dataset.field = fieldName;
      input.autocomplete = "off";
      row.append(button, input);
      return row;
    }

    function createPanel(index) {
      const panel = document.createElement("section");
      panel.className = "register-panel";
      panel.dataset.index = index;

      const header = document.createElement("div");
      header.className = "panel-header";
      const panelIndex = document.createElement("div");
      panelIndex.className = "panel-index";
      panelIndex.textContent = `REG ${index + 1}`;
      const regName = document.createElement("input");
      regName.className = "reg-name";
      regName.value = "Reg_Name";
      regName.autocomplete = "off";
      const clearButton = document.createElement("button");
      clearButton.type = "button";
      clearButton.className = "clear-panel-button";
      clearButton.dataset.clear = "true";
      clearButton.textContent = "Clear";
      header.append(panelIndex, regName, clearButton);

      const valueGrid = document.createElement("div");
      valueGrid.className = "value-grid";
      valueGrid.append(
        createValueRow("Bin", "bin"),
        createValueRow("Hex", "hex"),
        createValueRow("Dec", "dec")
      );

      panel.append(header, createBitBoard(), valueGrid);

      panel.addEventListener("change", (event) => {
        if (event.target.classList.contains("bit-check")) {
          setPanelFields(panel, getPanelValueFromBits(panel));
        }
      });

      panel.addEventListener("click", (event) => {
        const clearButton = event.target.closest("button[data-clear]");
        if (clearButton) {
          applyPanelValue(panel, 0n);
          return;
        }

        const button = event.target.closest("button[data-convert]");
        if (!button) {
          return;
        }
        const base = button.dataset.convert;
        const input = panel.querySelector(`[data-field="${base}"]`);
        const value = clampRegisterValue(parseValue(input.value, base));
        if (value === null) {
          markInvalid(input);
          return;
        }
        applyPanelValue(panel, value);
      });

      panel.addEventListener("keydown", (event) => {
        if (!event.target.classList.contains("value-input") || event.key !== "Enter") {
          return;
        }
        const base = event.target.dataset.field;
        panel.querySelector(`[data-convert="${base}"]`).click();
      });

      return panel;
    }

    for (let index = 0; index < REGISTER_COUNT; index += 1) {
      const panel = createPanel(index);
      panels.push(panel);
      app.appendChild(panel);
      applyPanelValue(panel, index === 0 ? 0x00010000n : 0n);
    }

    window.addEventListener("resize", fitPageToViewport);
    requestAnimationFrame(fitPageToViewport);
  </script>
</body>
</html>
